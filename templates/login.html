{% extends "base.html" %}

{% block title %}Login - Thaghrah{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Sign in</h2>
        <p class="subtitle">Welcome back. Sign in to continue your journey.</p>
        
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary">Sign in</button>
        </form>
        
        <p class="auth-link">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
    </div>
</div>
{% endblock %}
